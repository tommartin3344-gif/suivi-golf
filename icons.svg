const Stripe = require('stripe');
const { createClient } = require('@supabase/supabase-js');

const stripe = new Stripe(process.env.STRIPE_SECRET_KEY);
const supabaseAdmin = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_SERVICE_ROLE_KEY);

exports.handler = async (event) => {
  if (event.httpMethod !== 'POST') {
    return { statusCode: 405, body: 'Method Not Allowed' };
  }

  try {
    const authHeader = event.headers.authorization || '';
    const token = authHeader.replace('Bearer ', '');
    const {
      data: { user },
      error: userErr,
    } = await supabaseAdmin.auth.getUser(token);
    if (userErr || !user) {
      return { statusCode: 401, body: JSON.stringify({ error: 'Non authentifié' }) };
    }

    const { data: abonnement } = await supabaseAdmin
      .from('abonnements')
      .select('stripe_customer_id')
      .eq('user_id', user.id)
      .maybeSingle();

    if (!abonnement?.stripe_customer_id) {
      return { statusCode: 400, body: JSON.stringify({ error: 'Aucun abonnement trouvé' }) };
    }

    const origin = event.headers.origin || `https://${event.headers.host}`;
    const session = await stripe.billingPortal.sessions.create({
      customer: abonnement.stripe_customer_id,
      return_url: origin,
    });

    return { statusCode: 200, body: JSON.stringify({ url: session.url }) };
  } catch (err) {
    console.error(err);
    return { statusCode: 500, body: JSON.stringify({ error: err.message }) };
  }
};
